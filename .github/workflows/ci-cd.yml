name: CI/CD - Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKERHUB_USERNAME: claes1981
  IMAGE_NAME: cloudsoft-recruitment
  UNIQUE_SUFFIX: ${{ github.run_id }}
  RESOURCE_GROUP: cloudsoft-rg
  LOCATION: northeurope

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  provision:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create \
              --name ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.LOCATION }} \
              --only-show-errors 2>/dev/null || true

      - name: Provision Bicep infrastructure
        uses: azure/cli@v2
        with:
          inlineScript: |
            az deployment group create \
               --resource-group ${{ env.RESOURCE_GROUP }} \
               --template-file infra/main.bicep \
               --parameters \
                 uniqueSuffix=${{ env.UNIQUE_SUFFIX }} \
                 dockerHubUsername=${{ secrets.DOCKERHUB_USERNAME }} \
                 containerImage=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify provisioning
        uses: azure/cli@v2
        with:
          inlineScript: |
            APP_FQDN=$(az deployment group show \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name main \
              --query properties.outputs.appUrl.value \
              --output tsv)
            echo "App deployed at: https://$APP_FQDN"

      - name: Smoke test
        run: |
          APP_FQDN=$(az deployment group show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name main \
            --query properties.outputs.appUrl.value \
            --output tsv)
          # Use /health/live (liveness probe) — no dependency checks, just process alive.
          curl -f "https://$APP_FQDN/health/live" || exit 1
